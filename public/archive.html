<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPDA Archived Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; } 
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
</head>
<body class="bg-gray-50 font-sans relative h-screen overflow-hidden flex">

    <div class="w-64 bg-white border-r border-gray-200 flex-col hidden sm:flex z-10">
        <div class="p-4 flex items-center space-x-2">
            <div class="bg-blue-100 p-2 rounded-lg"><i data-feather="users" class="text-blue-600"></i></div>
            <span class="font-bold text-gray-800">SPDA System</span>
        </div>
        <nav class="flex-1 px-2 space-y-1 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100"><i data-feather="home" class="mr-3"></i> Dashboard </a>
            <a href="analytics.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100 sidebar-link"><i data-feather="trending-up" class="mr-3"></i> Analytics </a>
            <a href="reports.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100"><i data-feather="file" class="mr-3"></i> Data Reports </a>
            <a href="members.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100"><i data-feather="users" class="mr-3"></i> Members </a>
            <a href="applications.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100"><i data-feather="file-text" class="mr-3"></i> Applications </a>
            <a href="renewals.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100"><i data-feather="refresh-cw" class="mr-3"></i> Renewals </a>
            <a href="announcements.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100"><i data-feather="bell" class="mr-3"></i> Announcements </a>
            <div class="pt-4 mt-4 border-t border-gray-200">
                <a href="archive.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-red-600 bg-red-50 hover:bg-red-100"><i data-feather="archive" class="mr-3"></i> Archive </a>
            </div>
        </nav>
        <div class="p-4 border-t border-gray-200">
                <div class="flex items-center space-x-3">
                    <img id="admin-avatar-desktop" src="https://i.pravatar.cc/200?img=1" class="w-10 h-10 rounded-full" alt="Admin">
                    <div>
                        <p id="admin-name-desktop" class="text-sm font-medium text-gray-900">Hello Admin!</p>
                        <p class="text-xs text-gray-500">Welcome to SPDA</p>
                    </div>
                </div>
                <button class="mt-4 w-full flex items-center justify-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    <i data-feather="log-out" class="mr-2"></i> Log Out
                </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden relative">
        <div class="flex-1 overflow-auto p-6">
            
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 mb-1">Archived Records</h1>
                    <p class="text-red-500 text-sm font-medium">Deactivated and frozen accounts.</p>
                </div>
                <div class="flex gap-3">
                    <button class="bg-gray-200 text-gray-500 px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 cursor-not-allowed shadow-sm">
                        <i data-feather="lock" class="w-4 h-4"></i> Read Only
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-12">
                        <label class="text-xs text-gray-500 font-bold uppercase">Search Archive (Name / ID)</label>
                        <input type="text" id="f-search" placeholder="Search deactivated members..." class="w-full border rounded px-3 py-2 text-sm focus:ring-red-500 focus:border-red-500" oninput="applyArchiveSearch()">
                    </div>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row gap-6">
                <div class="w-full">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-sm text-gray-500">Showing archived members</p>
                    </div>
                    <div id="members-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="col-span-2 text-center py-10 text-gray-400">Loading archives...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="archive.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => feather.replace());
    </script>
</body>
</html>
